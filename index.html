<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Atendimento e Rotas (Cloud)</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --secondary-color: #f4f4f9;
            --text-color: #333;
            --border-radius: 8px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: var(--border-radius);
            box-sizing: border-box;
            font-size: 16px;
        }

        /* Estilização para o dropdown customizado */
        .suggestions {
            position: absolute;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            background: white;
            border: 1px solid #ccc;
            border-top: none;
            z-index: 1000;
            display: none;
            border-radius: 0 0 var(--border-radius) var(--border-radius);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .suggestion-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }

        .suggestion-item:hover {
            background-color: #f0f0f0;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #004494;
        }
        
        button:disabled {
            background-color: #999;
            cursor: not-allowed;
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            background-color: var(--secondary-color);
            border-left: 5px solid var(--primary-color);
            border-radius: var(--border-radius);
            display: none;
        }

        .result-item {
            margin-bottom: 10px;
            font-size: 15px;
        }

        .result-item strong {
            color: var(--primary-color);
        }
        
        .destaque-custo {
            font-size: 20px;
            color: #28a745;
            font-weight: bold;
            text-align: center;
            margin-top: 15px;
        }

        #status {
            text-align: center;
            color: #0056b3;
            font-weight: bold;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Simulador de Rotas e Custos</h2>
    
    <div id="status">Carregando dados da planilha...</div>

    <div class="form-group">
        <label for="cidade">Cidade de Destino:</label>
        <input type="text" id="cidade" placeholder="Comece a digitar a cidade..." autocomplete="off">
        <div id="cidade-suggestions" class="suggestions"></div>
    </div>

    <div class="form-group">
        <label for="equipamento">Equipamento:</label>
        <input type="text" id="equipamento" placeholder="Comece a digitar o modelo..." autocomplete="off">
        <div id="equip-suggestions" class="suggestions"></div>
    </div>

    <button id="btn-calcular" onclick="simularAtendimento()" disabled>Calcular Rota e Custo</button>

    <div class="result-box" id="resultado">
        <div class="result-item"><strong>Técnico:</strong> <span id="res-tecnico"></span></div>
        <div class="result-item"><strong>Partida:</strong> <span id="res-partida"></span></div>
        <div class="result-item"><strong>Atende:</strong> <span id="res-equip"></span></div>
        <hr>
        <div class="result-item"><strong>Distância:</strong> <span id="res-km"></span> km</div>
        <div class="destaque-custo">Custo Estimado: R$ <span id="res-custo">0,00</span></div>
    </div>
</div>

<script>
    const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQUoawnkg_AwYgDNPdsY7gXSQefxAPVPwSYVwI3mzRo2OSp_nyzuhYNS_OJbLi9AAVX8nibvBoR0fEn/pub?gid=1534734335&single=true&output=csv';
    const CUSTO_POR_KM = 1.59;
    
    let baseDados = [];
    let listaEquipamentos = new Set();

    // Carregar dados ao iniciar
    async function carregarDados() {
        const statusEl = document.getElementById('status');
        try {
            const response = await fetch(SHEET_URL);
            const csvText = await response.text();
            
            // Parse CSV simples (considerando que os campos podem ter vírgulas dentro de aspas se necessário, 
            // mas aqui usaremos uma lógica para o formato padrão do Google Sheets)
            const rows = csvText.split('\n').slice(1); // Remove cabeçalho
            
            baseDados = rows.map(row => {
                // Regex para lidar com vírgulas dentro de aspas (comum em nomes de cidades "Cidade, UF")
                const cols = [];
                let inQuote = false;
                let currentField = '';
                for (let i = 0; i < row.length; i++) {
                    const char = row[i];
                    if (char === '"') {
                        inQuote = !inQuote;
                    } else if (char === ',' && !inQuote) {
                        cols.push(currentField.trim());
                        currentField = '';
                    } else {
                        currentField += char;
                    }
                }
                cols.push(currentField.trim()); // Add the last field

                
                if (cols && cols.length >= 5) {
                    const cidade = cols[0].replace(/^"|"$/g, '');
                    const atendente = cols[1].replace(/^"|"$/g, '');
                    const partida = cols[2].replace(/^"|"$/g, '');
                    const equipsStr = cols[3].replace(/^"|"$/g, '');
                    const todosEquipsStr = cols[4].replace(/^"|"$/g, '');
                    
                    // Extrair equipamentos para a lista de sugestões
if (todosEquipsStr) {
                        todosEquipsStr.split(/ - | \/ |, /).forEach(e => {
                            if(e.trim()) listaEquipamentos.add(e.trim().toUpperCase());
                        });
                    }

                    return { cidade, atendente, partida, equipamentos: equipsStr };
                }
                return null;
            }).filter(item => item !== null);

            statusEl.textContent = "Dados carregados com sucesso!";
            document.getElementById('btn-calcular').disabled = false;
            setTimeout(() => statusEl.style.display = 'none', 2000);
            
            setupAutocomplete('cidade', 'cidade-suggestions', () => baseDados.map(i => i.cidade));
            setupAutocomplete('equipamento', 'equip-suggestions', () => Array.from(listaEquipamentos));

        } catch (error) {
            console.error(error);
            statusEl.textContent = "Erro ao carregar dados da planilha. Verifique sua internet.";
            statusEl.style.color = 'red';
        }
    }

    // Sistema de Autocomplete Otimizado
    function setupAutocomplete(inputId, suggestionsId, getListFn) {
        const input = document.getElementById(inputId);
        const suggestionsBox = document.getElementById(suggestionsId);

        input.addEventListener('input', function() {
            const val = this.value.toUpperCase();
            suggestionsBox.innerHTML = '';
            if (!val) {
                suggestionsBox.style.display = 'none';
                return;
            }

            const filtered = getListFn().filter(item => item.toUpperCase().includes(val)).slice(0, 10);
            
            if (filtered.length > 0) {
                filtered.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.textContent = item;
                    div.onclick = () => {
                        input.value = item;
                        suggestionsBox.style.display = 'none';
                    };
                    suggestionsBox.appendChild(div);
                });
                suggestionsBox.style.display = 'block';
            } else {
                suggestionsBox.style.display = 'none';
            }
        });

        // Mostrar sugestões ao clicar se houver valor
        input.addEventListener('click', function() {
            if (this.value) {
                const event = new Event('input');
                this.dispatchEvent(event);
            }
        });

        // Fechar sugestões ao clicar fora
        document.addEventListener('click', function(e) {
            if (e.target !== input) suggestionsBox.style.display = 'none';
        });
    }

    async function obterCoordenadas(cidade) {
        const query = encodeURIComponent(cidade + ", Brasil");
        const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`);
        const data = await response.json();
        return (data && data.length > 0) ? { lat: data[0].lat, lon: data[0].lon } : null;
    }

    async function obterDistancia(coordOrigem, coordDestino) {
        const url = `https://router.project-osrm.org/route/v1/driving/${coordOrigem.lon},${coordOrigem.lat};${coordDestino.lon},${coordDestino.lat}?overview=false`;
        const response = await fetch(url);
        const data = await response.json();
        return (data && data.routes && data.routes.length > 0) ? data.routes[0].distance / 1000 : null;
    }

    async function simularAtendimento() {
        const cidadeInput = document.getElementById('cidade').value.trim();
        const equipInput = document.getElementById('equipamento').value.toUpperCase().trim();
        const btn = document.getElementById('btn-calcular');
        const resultadoBox = document.getElementById('resultado');
        const statusEl = document.getElementById('status');

        if(!cidadeInput || !equipInput) {
            alert("Por favor, preencha a cidade e o equipamento.");
            return;
        }

        const registro = baseDados.find(item => item.cidade.toUpperCase() === cidadeInput.toUpperCase());

        if(!registro) {
            alert("Cidade não encontrada. Selecione uma opção da lista.");
            return;
        }

        btn.disabled = true;
        statusEl.style.display = 'block';
        statusEl.textContent = "Calculando rota via GPS...";
        resultadoBox.style.display = 'none';

        let tecnico = registro.atendente;
        let partida = registro.partida;
        let equipsRegiao = registro.equipamentos;

        // Regra da Matriz
        if(equipsRegiao.toUpperCase() !== "TODOS" && !equipsRegiao.toUpperCase().includes(equipInput)) {
            tecnico = "TÉCNICO MATRIZ";
            partida = "SÃO CARLOS, SP";
        }

        try {
            const coordOrigem = await obterCoordenadas(partida);
            const coordDestino = await obterCoordenadas(cidadeInput);

            if (!coordOrigem || !coordDestino) {
                alert("Erro ao localizar cidades no GPS.");
            } else {
                const distancia = await obterDistancia(coordOrigem, coordDestino);
                if (distancia) {
                    const custo = distancia * CUSTO_POR_KM;
                    document.getElementById('res-tecnico').textContent = tecnico;
                    document.getElementById('res-partida').textContent = partida;
                    document.getElementById('res-equip').textContent = equipsRegiao;
                    document.getElementById('res-km').textContent = distancia.toFixed(1).replace('.', ',');
                    document.getElementById('res-custo').textContent = custo.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                    resultadoBox.style.display = 'block';
                } else {
                    alert("Rota não encontrada.");
                }
            }
        } catch (error) {
            alert("Erro de conexão com o GPS.");
        } finally {
            btn.disabled = false;
            statusEl.style.display = 'none';
        }
    }

    window.onload = carregarDados;
</script>

</body>
</html>
