<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Atendimento e Rotas (Cloud)</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --secondary-color: #f4f4f9;
            --text-color: #333;
            --border-radius: 8px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: var(--border-radius);
            box-sizing: border-box;
            font-size: 16px;
        }

        .suggestions {
            position: absolute;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            background: white;
            border: 1px solid #ccc;
            border-top: none;
            z-index: 1000;
            display: none;
            border-radius: 0 0 var(--border-radius) var(--border-radius);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .suggestion-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }

        .suggestion-item:hover {
            background-color: #f0f0f0;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #004494;
        }
        
        button:disabled {
            background-color: #999;
            cursor: not-allowed;
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            background-color: var(--secondary-color);
            border-left: 5px solid var(--primary-color);
            border-radius: var(--border-radius);
            display: none;
        }

        .result-item {
            margin-bottom: 10px;
            font-size: 15px;
        }

        .result-item strong {
            color: var(--primary-color);
        }
        
        .destaque-custo {
            font-size: 20px;
            color: #28a745;
            font-weight: bold;
            text-align: center;
            margin-top: 15px;
        }

        #status {
            text-align: center;
            color: #0056b3;
            font-weight: bold;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Simulador de Rotas e Custos</h2>
    
    <div id="status">Carregando dados da planilha...</div>

    <div class="form-group">
        <label for="cidade">Cidade de Destino:</label>
        <input type="text" id="cidade" placeholder="Comece a digitar a cidade..." autocomplete="off">
        <div id="cidade-suggestions" class="suggestions"></div>
    </div>

    <div class="form-group">
        <label for="equipamento">Equipamento:</label>
        <input type="text" id="equipamento" placeholder="Comece a digitar o modelo..." autocomplete="off">
        <div id="equip-suggestions" class="suggestions"></div>
    </div>

    <button id="btn-calcular" onclick="simularAtendimento()" disabled>Calcular Rota e Custo</button>

    <div class="result-box" id="resultado">
        <div class="result-item"><strong>Técnico:</strong> <span id="res-tecnico"></span></div>
        <div class="result-item"><strong>Partida:</strong> <span id="res-partida"></span></div>
        <div class="result-item"><strong>Equipamentos Autorizados na Região:</strong> <span id="res-equip"></span></div>
        <hr>
        <div class="result-item"><strong>Distância:</strong> <span id="res-km"></span> km</div>
        <div class="destaque-custo">Custo Estimado: R$ <span id="res-custo">0,00</span></div>
    </div>
</div>

<script>
    // ⚠️ ATENÇÃO: SUBSTITUA A URL ABAIXO PELA URL GERADA NA IMPLANTAÇÃO DO SEU SCRIPT
    const SCRIPT_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxHK9V8XCYoYQNXUBjk1p_rLOX2-BOBKKCeaBnnHZFTmGnXv1Fx5jNC8VAUoMVko8g4/exec';
    const CUSTO_POR_KM = 1.59;
    
    let baseDados = [];
    let listaEquipamentos = [];

    // Carregar dados ao iniciar
    async function carregarDados() {
        const statusEl = document.getElementById('status');
        try {
            const response = await fetch(SCRIPT_WEB_APP_URL);
            const data = await response.json();

            if (data.error) {
                throw new Error(data.error);
            }

            baseDados = data.baseDados || [];
            listaEquipamentos = data.listaEquipamentos || [];

            statusEl.textContent = "Dados carregados com sucesso!";
            statusEl.style.color = 'green';
            document.getElementById('btn-calcular').disabled = false;
            setTimeout(() => statusEl.style.display = 'none', 2000);
            
            // Inicializa autocompletes limpando duplicados
            setupAutocomplete('cidade', 'cidade-suggestions', () => {
                return Array.from(new Set(baseDados.map(i => i.cidade).filter(Boolean)));
            });
            setupAutocomplete('equipamento', 'equip-suggestions', () => listaEquipamentos);

        } catch (error) {
            console.error(error);
            statusEl.textContent = "Erro ao carregar dados da planilha. Verifique a URL do Script e sua internet.";
            statusEl.style.color = 'red';
        }
    }

    // Sistema de Autocomplete Otimizado
    function setupAutocomplete(inputId, suggestionsId, getListFn) {
        const input = document.getElementById(inputId);
        const suggestionsBox = document.getElementById(suggestionsId);

        input.addEventListener('input', function() {
            const val = this.value.toUpperCase();
            suggestionsBox.innerHTML = '';
            if (!val) {
                suggestionsBox.style.display = 'none';
                return;
            }

            const filtered = getListFn().filter(item => item.toUpperCase().includes(val)).slice(0, 10);
            
            if (filtered.length > 0) {
                filtered.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.textContent = item;
                    div.onclick = () => {
                        input.value = item;
                        suggestionsBox.style.display = 'none';
                    };
                    suggestionsBox.appendChild(div);
                });
                suggestionsBox.style.display = 'block';
            } else {
                suggestionsBox.style.display = 'none';
            }
        });

        // Mostrar sugestões ao clicar se houver valor
        input.addEventListener('click', function() {
            if (this.value) {
                const event = new Event('input');
                this.dispatchEvent(event);
            }
        });

        // Fechar sugestões ao clicar fora
        document.addEventListener('click', function(e) {
            if (e.target !== input) suggestionsBox.style.display = 'none';
        });
    }

    async function obterCoordenadas(cidade) {
        try {
            const query = encodeURIComponent(cidade + ", Brasil");
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`);
            const data = await response.json();
            return (data && data.length > 0) ? { lat: data[0].lat, lon: data[0].lon } : null;
        } catch (e) {
            return null;
        }
    }

    async function obterDistancia(coordOrigem, coordDestino) {
        try {
            const url = `https://router.project-osrm.org/route/v1/driving/${coordOrigem.lon},${coordOrigem.lat};${coordDestino.lon},${coordDestino.lat}?overview=false`;
            const response = await fetch(url);
            const data = await response.json();
            return (data && data.routes && data.routes.length > 0) ? data.routes[0].distance / 1000 : null;
        } catch(e) {
            return null;
        }
    }

    async function simularAtendimento() {
        const cidadeInput = document.getElementById('cidade').value.trim();
        const equipInput = document.getElementById('equipamento').value.toUpperCase().trim();
        const btn = document.getElementById('btn-calcular');
        const resultadoBox = document.getElementById('resultado');
        const statusEl = document.getElementById('status');

        if(!cidadeInput || !equipInput) {
            alert("Por favor, preencha a cidade e o equipamento.");
            return;
        }

        const registro = baseDados.find(item => item.cidade.toUpperCase() === cidadeInput.toUpperCase());

        if(!registro) {
            alert("Cidade não encontrada na base de dados da planilha.");
            return;
        }

        btn.disabled = true;
        statusEl.style.display = 'block';
        statusEl.style.color = '#0056b3';
        statusEl.textContent = "Calculando rota via GPS...";
        resultadoBox.style.display = 'none';

        let tecnico = registro.atendente;
        let partida = registro.partida;
        let equipsRegiao = registro.equipamentos;

        // Regra da Matriz: se a região não aceita tudo e o equipamento digitado não está listado na célula
        if(equipsRegiao.toUpperCase() !== "TODOS" && !equipsRegiao.toUpperCase().includes(equipInput)) {
            tecnico = "TÉCNICO MATRIZ";
            partida = "SÃO CARLOS, SP";
        }

        try {
            const coordOrigem = await obterCoordenadas(partida);
            const coordDestino = await obterCoordenadas(cidadeInput);

            if (!coordOrigem || !coordDestino) {
                alert("Erro ao localizar as cidades de partida ou destino no GPS.");
            } else {
                const distancia = await obterDistancia(coordOrigem, coordDestino);
                if (distancia) {
                    const custo = distancia * CUSTO_POR_KM;
                    document.getElementById('res-tecnico').textContent = tecnico;
                    document.getElementById('res-partida').textContent = partida;
                    document.getElementById('res-equip').textContent = equipsRegiao;
                    document.getElementById('res-km').textContent = distancia.toFixed(1).replace('.', ',');
                    document.getElementById('res-custo').textContent = custo.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
                    resultadoBox.style.display = 'block';
                } else {
                    alert("Rota rodoviária não encontrada entre os pontos.");
                }
            }
        } catch (error) {
            alert("Erro de conexão com os servidores de GPS.");
        } finally {
            btn.disabled = false;
            statusEl.style.display = 'none';
        }
    }

    // Dispara a carga de dados ao abrir a página
    window.onload = carregarDados;
</script>

</body>
</html>
