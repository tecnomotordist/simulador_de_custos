<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Atendimento e Rotas (Cloud)</title>
    <style>
        :root {
            --primary-color: #0056b3;
            --secondary-color: #f4f4f9;
            --text-color: #333;
            --border-radius: 8px;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #e9ecef;
            color: var(--text-color);
            display: flex;
            justify-content: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: var(--border-radius);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 500px;
        }

        h2 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 25px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        label {
            display: block;
            font-weight: bold;
            margin-bottom: 5px;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: var(--border-radius);
            box-sizing: border-box;
            font-size: 16px;
        }

        .suggestions {
            position: absolute;
            width: 100%;
            max-height: 200px;
            overflow-y: auto;
            background: white;
            border: 1px solid #ccc;
            border-top: none;
            z-index: 1000;
            display: none;
            border-radius: 0 0 var(--border-radius) var(--border-radius);
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .suggestion-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }

        .suggestion-item:hover {
            background-color: #f0f0f0;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: var(--primary-color);
            color: white;
            border: none;
            border-radius: var(--border-radius);
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }

        button:hover {
            background-color: #004494;
        }
        
        button:disabled {
            background-color: #999;
            cursor: not-allowed;
        }

        .result-box {
            margin-top: 25px;
            padding: 20px;
            background-color: var(--secondary-color);
            border-left: 5px solid var(--primary-color);
            border-radius: var(--border-radius);
            display: none;
        }

        .result-item {
            margin-bottom: 10px;
            font-size: 15px;
        }

        .result-item strong {
            color: var(--primary-color);
        }
        
        .destaque-custo {
            font-size: 20px;
            color: #28a745;
            font-weight: bold;
            text-align: center;
            margin-top: 15px;
        }

        #status {
            text-align: center;
            color: #0056b3;
            font-weight: bold;
            margin-top: 15px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Simulador de Rotas e Custos</h2>
    
    <div id="status">Carregando dados da planilha...</div>

    <div class="form-group">
        <label for="cidade">Cidade de Destino:</label>
        <input type="text" id="cidade" placeholder="Digite ou selecione a cidade..." autocomplete="off">
        <div id="cidade-suggestions" class="suggestions"></div>
    </div>

    <div class="form-group">
        <label for="equipamento">Equipamento Requerido:</label>
        <input type="text" id="equipamento" placeholder="Selecione o modelo do equipamento..." autocomplete="off">
        <div id="equip-suggestions" class="suggestions"></div>
    </div>

    <button id="btn-calcular" onclick="simularAtendimento()" disabled>Calcular Rota e Custo</button>

    <div class="result-box" id="resultado">
        <div class="result-item"><strong>Atendente Definido:</strong> <span id="res-tecnico"></span></div>
        <div class="result-item"><strong>Cidade de Partida:</strong> <span id="res-partida"></span></div>
        <div class="result-item"><strong>Escopo do Representante Local:</strong> <span id="res-equip"></span></div>
        <hr>
        <div class="result-item"><strong>Distância Calculada:</strong> <span id="res-km"></span> km</div>
        <div class="destaque-custo">Custo Estimado: R$ <span id="res-custo">0,00</span></div>
    </div>
</div>

<script>
    // ⚠️ SUBSTITUA PELA SUA URL DO GOOGLE APPS SCRIPT
    const SCRIPT_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbxHK9V8XCYoYQNXUBjk1p_rLOX2-BOBKKCeaBnnHZFTmGnXv1Fx5jNC8VAUoMVko8g4/exec';
    const CUSTO_POR_KM = 1.59;
    
    let baseDados = [];
    let listaEquipamentos = [];

    // Função auxiliar para remover acentos e padronizar buscas
    function normalizarTexto(str) {
        return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toUpperCase().trim();
    }

    async function carregarDados() {
        const statusEl = document.getElementById('status');
        try {
            const response = await fetch(SCRIPT_WEB_APP_URL);
            const data = await response.json();

            if (data.error) throw new Error(data.error);

            baseDados = data.baseDados || [];
            listaEquipamentos = data.listaEquipamentos || [];

            statusEl.textContent = "Dados sincronizados com sucesso!";
            statusEl.style.color = 'green';
            document.getElementById('btn-calcular').disabled = false;
            setTimeout(() => statusEl.style.display = 'none', 2000);
            
            // Autocomplete de Cidades (Lista Dinâmica sem duplicados)
            setupAutocomplete('cidade', 'cidade-suggestions', () => {
                return Array.from(new Set(baseDados.map(i => i.cidadeOriginal).filter(Boolean)));
            });

            // Autocomplete de Equipamentos (Lista Global vinda de toda a planilha)
            setupAutocomplete('equipamento', 'equip-suggestions', () => listaEquipamentos);

        } catch (error) {
            console.error(error);
            statusEl.textContent = "Erro ao carregar dados. Verifique a URL do Script.";
            statusEl.style.color = 'red';
        }
    }

    function setupAutocomplete(inputId, suggestionsId, getListFn) {
        const input = document.getElementById(inputId);
        const suggestionsBox = document.getElementById(suggestionsId);

        input.addEventListener('input', function() {
            const val = normalizarTexto(this.value);
            suggestionsBox.innerHTML = '';
            if (!val) {
                suggestionsBox.style.display = 'none';
                return;
            }

            const filtered = getListFn().filter(item => normalizarTexto(item).includes(val)).slice(0, 10);
            
            if (filtered.length > 0) {
                filtered.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.textContent = item;
                    div.onclick = () => {
                        input.value = item;
                        suggestionsBox.style.display = 'none';
                    };
                    suggestionsBox.appendChild(div);
                });
                suggestionsBox.style.display = 'block';
            } else {
                suggestionsBox.style.display = 'none';
            }
        });

        input.addEventListener('click', function() {
            if (this.value) {
                const event = new Event('input');
                this.dispatchEvent(event);
            }
        });

        document.addEventListener('click', function(e) {
            if (e.target !== input) suggestionsBox.style.display = 'none';
        });
    }

    async function obterCoordenadas(cidade) {
        try {
            const query = encodeURIComponent(cidade + ", Brasil");
            const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${query}`);
            const data = await response.json();
            return (data && data.length > 0) ? { lat: data[0].lat, lon: data[0].lon } : null;
        } catch (e) { return null; }
    }

    async function obterDistancia(coordOrigem, coordDestino) {
        try {
            const url = `https://router.project-osrm.org/route/v1/driving/${coordOrigem.lon},${coordOrigem.lat};${coordDestino.lon},${coordDestino.lat}?overview=false`;
            const response = await fetch(url);
            const data = await response.json();
            return (data && data.routes && data.routes.length > 0) ? data.routes[0].distance / 1000 : null;
        } catch(e) { return null; }
    }

    async function simularAtendimento() {
        const cidadeInput = document.getElementById('cidade').value;
        const equipInput = document.getElementById('equipamento').value;
        const btn = document.getElementById('btn-calcular');
        const resultadoBox = document.getElementById('resultado');
        const statusEl = document.getElementById('status');

        if(!cidadeInput || !equipInput) {
            alert("Por favor, preencha a cidade e o equipamento.");
            return;
        }

        // Busca o registro da região com base na cidade digitada
        const registro = baseDados.find(item => item.cidade === normalizarTexto(cidadeInput));

        if(!registro) {
            alert("Cidade não cadastrada na base de dados da planilha.");
            return;
        }

        btn.disabled = true;
        statusEl.style.display = 'block';
        statusEl.style.color = '#0056b3';
        statusEl.textContent = "Analisando escopo e calculando rota GPS...";
        resultadoBox.style.display = 'none';

        let tecnico = registro.atendente;
        let partida = registro.partida;
        let equipsRegiao = registro.equipamentos;

        // REGRA DE NEGÓCIO DA MATRIZ:
        // Se a região do representante NÃO for "TODOS" e NÃO incluir o equipamento selecionado...
        const escopoRegiao = equipsRegiao.toUpperCase().trim();
        const modeloEscolhido = equipInput.toUpperCase().trim();

        if(escopoRegiao !== "TODOS" && !escopoRegiao.includes(modeloEscolhido)) {
            // ...o atendimento obrigatoriamente vai para a Matriz
            tecnico = "TÉCNICO MATRIZ (Fora do escopo regional)";
            partida = "SÃO CARLOS, SP";
        }

        try {
            const coordOrigem = await obterCoordenadas(partida);
            const coordDestino = await obterCoordenadas(cidadeInput);

            if (!coordOrigem || !coordDestino) {
                alert("Erro ao localizar as coordenadas dos municípios no GPS.");
            } else {
                const distancia = await obterDistancia(coordOrigem, coordDestino);
if (distancia) {
    // ALTERAÇÃO AQUI: Multiplicamos a distância por 2 para considerar Ida e Volta
    const distanciaTotal = distancia * 2; 
    const custo = distanciaTotal * CUSTO_POR_KM;
    
    document.getElementById('res-tecnico').textContent = tecnico;
    document.getElementById('res-partida').textContent = partida;
    document.getElementById('res-equip').textContent = equipsRegiao;
    
    // Atualiza a tela com a quilometragem total (Ida + Volta)
    document.getElementById('res-km').textContent = distanciaTotal.toFixed(1).replace('.', ',');
    document.getElementById('res-custo').textContent = custo.toLocaleString('pt-BR', { minimumFractionDigits: 2 });
    resultadoBox.style.display = 'block';
} else {
                    alert("Não foi possível traçar uma rota rodoviária válida.");
                }
            }
        } catch (error) {
            alert("Falha ao contatar os serviços de mapa.");
        } finally {
            btn.disabled = false;
            statusEl.style.display = 'none';
        }
    }

    window.onload = carregarDados;
</script>

</body>
</html>
